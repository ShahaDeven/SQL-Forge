# SQLForge DPO — preference optimization on top of the SFT adapter (bf16 LoRA).
# Uses the adapter-as-reference trick: policy = a trainable copy of the SFT adapter,
# reference = the frozen SFT adapter. One base model in memory, two small adapters.

model_name: Qwen/Qwen2.5-Coder-7B-Instruct
sft_adapter: /workspace/sqlforge-sft-7b          # the SFT LoRA (policy init + reference)
dpo_file: sqlforge/data/datasets/dpo_pairs.jsonl
output_dir: /workspace/sqlforge-dpo-7b

# --- LoRA (same shape as SFT) ---
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# --- DPO ---
beta: 0.1                         # sweep 0.05-0.3 if the gate regresses
max_prompt_length: 1536
max_length: 2048                  # prompt + completion
per_device_train_batch_size: 2
gradient_accumulation_steps: 8    # effective batch 16
gradient_checkpointing: true
learning_rate: 0.000005           # 5e-6 — much lower than SFT
lr_scheduler_type: cosine
warmup_ratio: 0.1
num_train_epochs: 1
bf16: true
optim: adamw_torch

# --- logging / checkpoints ---
logging_steps: 10
save_strategy: steps
save_steps: 100
save_total_limit: 2
seed: 42

# --- W&B ---
wandb_project: sqlforge-dpo
run_name: qwen7b-dpo-beta0.1
